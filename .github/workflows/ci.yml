name: Netra NOC CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter and Formatter Check
        run: npm run check

      - name: Run Security Audit
        run: npm run security:audit

      - name: Build Frontend
        run: npm run build

      - name: Run Tests
        # Assuming Postgres is required for integration tests, you might need a DB service here.
        # For now, running tests as is.
        run: npm test
